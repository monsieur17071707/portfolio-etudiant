<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog • Cécé Gilbert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Plus+Jakarta+Sans:wght@400;500&display=swap');
        body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
        h1, h2, h3 { font-family: 'Inter', sans-serif; font-weight: 900; }
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(12px); }
        .dark { background-color: #0F172A; color: #F8F9FA; }
        .prose { max-width: none; }
    </style>
</head>
<body class="dark">
    <!-- HEADER (identique à index.html) -->
    <header class="sticky top-0 z-50 glass border-b border-white/10">
        <div class="max-w-7xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-[#3B82F6] rounded-2xl flex items-center justify-center text-white font-bold text-xl">CG</div>
                <span class="text-2xl font-black tracking-tighter">Cécé Gilbert</span>
            </div>
            <nav class="hidden md:flex items-center gap-8 text-lg">
                <a href="index.html" class="hover:text-[#3B82F6] transition-colors">Accueil</a>
                <a href="index.html#profil" class="hover:text-[#3B82F6] transition-colors">Profil</a>
                <a href="index.html#competences" class="hover:text-[#3B82F6] transition-colors">Compétences</a>
                <a href="index.html#projets" class="hover:text-[#3B82F6] transition-colors">Projets</a>
                <a href="index.html#passions" class="hover:text-[#3B82F6] transition-colors">Passions</a>
                <a href="blog.html" class="text-[#3B82F6] font-medium">Blog</a>
            </nav>
            <a href="assets/docs/CV.pdf" target="_blank" class="flex items-center gap-2 bg-[#3B82F6] text-white px-6 py-3 rounded-2xl font-medium hover:bg-[#2563EB]">
                Télécharger CV
            </a>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-8 py-12">
        <h1 class="text-5xl font-black text-center mb-4">Jardin d’Idées</h1>
        <p class="text-center text-[#F8F9FA]/60 mb-12">Réflexions, analyses et découvertes en finance, gestion et digital</p>

        <!-- Filtres et recherche -->
        <div class="flex flex-col md:flex-row gap-4 mb-10 items-center">
            <div class="flex gap-2 flex-wrap" id="filtres">
                <button onclick="filterCategory('Tout')" class="filtre-btn active px-6 py-3 rounded-3xl bg-[#3B82F6] text-white text-sm font-medium">Tout</button>
                <button onclick="filterCategory('Finance')" class="filtre-btn px-6 py-3 rounded-3xl hover:bg-[#1E293B]">Finance</button>
                <button onclick="filterCategory('Gestion')" class="filtre-btn px-6 py-3 rounded-3xl hover:bg-[#1E293B]">Gestion</button>
                <button onclick="filterCategory('Divers')" class="filtre-btn px-6 py-3 rounded-3xl hover:bg-[#1E293B]">Divers</button>
            </div>
            <input id="search-input" type="text" placeholder="Rechercher un article..." 
                   class="flex-1 glass px-6 py-4 rounded-3xl focus:outline-none text-sm" onkeyup="if(event.key==='Enter') filterBlog()">
        </div>

        <!-- Liste des articles -->
        <div class="grid md:grid-cols-3 gap-8" id="blog-container"></div>
    </div>

    <!-- MODALE ARTICLE COMPLET -->
    <div id="modal-article" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="glass max-w-4xl w-full mx-4 rounded-3xl max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-[#1E293B] px-8 py-5 flex justify-between items-center border-b border-white/10">
                <h2 id="article-titre" class="text-2xl font-black"></h2>
                <button onclick="closeArticleModal()" class="text-4xl leading-none">×</button>
            </div>
            <div id="article-contenu" class="p-8 prose prose-invert"></div>
        </div>
    </div>

    <script>
        let allPosts = [];

        async function loadBlogData() {
            const res = await fetch('data.json');
            const data = await res.json();
            allPosts = data.blog;
            renderBlog(allPosts);
        }

        function renderBlog(posts) {
            const container = document.getElementById('blog-container');
            container.innerHTML = '';
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'glass p-6 rounded-3xl cursor-pointer hover:scale-105 transition-all';
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-medium px-4 py-1 bg-[#3B82F6] text-white rounded-3xl">${post.categorie}</span>
                        <span class="text-[#F8F9FA]/60 text-sm">${post.date}</span>
                    </div>
                    <h3 class="text-xl font-black mb-3">${post.titre}</h3>
                    <p class="text-[#F8F9FA]/70 line-clamp-3">${post.resume}</p>
                `;
                card.onclick = () => openArticle(post);
                container.appendChild(card);
            });
            if (posts.length === 0) container.innerHTML = `<p class="text-center col-span-3 py-12 text-[#F8F9FA]/50">Aucun article trouvé.</p>`;
        }

        function filterCategory(cat) {
            document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('active', 'bg-[#3B82F6]'));
            if (cat === 'Tout') {
                document.querySelector('.filtre-btn').classList.add('active', 'bg-[#3B82F6]');
                renderBlog(allPosts);
            } else {
                const filtered = allPosts.filter(p => p.categorie === cat);
                renderBlog(filtered);
            }
        }

        function filterBlog() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = allPosts.filter(p => 
                p.titre.toLowerCase().includes(term) || 
                p.resume.toLowerCase().includes(term)
            );
            renderBlog(filtered);
        }

        function openArticle(post) {
            document.getElementById('article-titre').textContent = post.titre;
            const contenuHTML = marked.parse(post.contenu);
            document.getElementById('article-contenu').innerHTML = contenuHTML;
            const modal = document.getElementById('modal-article');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeArticleModal() {
            const modal = document.getElementById('modal-article');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Initialisation
        window.onload = loadBlogData;
    </script>

</body>
</html>
